<h2 style="color: #b11226; text-align: center;">Subir nueva ilustración</h2>

<form (ngSubmit)="onSubmit()" #ilustracionForm="ngForm" style="max-width: 500px; margin: 0 auto; background: #f1f1ed; padding: 2rem; border-radius: 16px;">
  
  <div style="margin-bottom: 1rem;">
    <label style="display: block; color: #1f2933; font-weight: 600;">Título:</label>
    <input type="text" [(ngModel)]="nuevaIlustracion.titulo" name="titulo" required style="width: 100%; padding: 0.5rem; border: 2px solid #b11226; border-radius: 8px;">
  </div>

  <div style="margin-bottom: 1rem;">
    <label style="display: block; color: #1f2933; font-weight: 600;">Colección:</label>
    <select [(ngModel)]="nuevaIlustracion.coleccion" name="coleccion" required style="width: 100%; padding: 0.5rem; border: 2px solid #b11226; border-radius: 8px;">
      <option value="kawaii">🌸 Kawaii</option>
      <option value="shonen">⚡ Shonen</option>
      <option value="manga">🖋️ Manga/Anime</option>
      <option value="personal">🦊 Personal (avatar)</option>
    </select>
  </div>

  <div style="margin-bottom: 1rem;">
    <label style="display: block; color: #1f2933; font-weight: 600;">Precio (€):</label>
    <input type="number" [(ngModel)]="nuevaIlustracion.precio" name="precio" required style="width: 100%; padding: 0.5rem; border: 2px solid #b11226; border-radius: 8px;">
  </div>

  <div style="margin-bottom: 2rem;">
    <label style="display: block; color: #1f2933; font-weight: 600;">Imagen:</label>
    <input type="file" (change)="onFileSelected($event)" accept="image/*" required style="width: 100%; padding: 0.5rem;">
    <small style="color: #b11226;">Selecciona la imagen desde tu carpeta "ilustraciones-kitsune"</small>
  </div>

  <button type="submit" style="background: #b11226; color: white; border: none; padding: 0.8rem 2rem; border-radius: 30px; width: 100%; font-weight: bold; cursor: pointer;">
    SUBIR ILUSTRACIÓN
  </button>
</form>

<hr style="margin: 3rem 0; border: 1px dashed #b11226;">

<h3 style="color: #b11226;">Ilustraciones subidas</h3>
<div class="panel-lista" style="display: grid; gap: 1rem;">
  <div *ngFor="let item of ilustraciones" style="display: flex; align-items: center; gap: 1rem; background: white; padding: 0.5rem; border-radius: 8px;">
    <img [src]="'http://localhost:3001' + item.imagen" width="50" height="50" style="border-radius: 8px; object-fit: cover;">
    <span>{{ item.titulo }} - {{ item.coleccion }} - {{ item.precio }}€</span>
    <button (click)="eliminar(item.id)" style="margin-left: auto; background: #dc2626; color: white; border: none; padding: 0.3rem 1rem; border-radius: 20px;">Eliminar</button>
  </div>
</div>
